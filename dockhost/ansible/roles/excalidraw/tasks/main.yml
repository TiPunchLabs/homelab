---
- name: Create install directory
  ansible.builtin.file:
    path: "{{ excalidraw_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create data directory
  ansible.builtin.file:
    path: "{{ excalidraw_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ excalidraw_install_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0600'
  notify: Restart excalidraw

- name: Deploy excalidraw with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ excalidraw_install_dir }}"
    state: present
    recreate: auto
    remove_orphans: true

- name: Wait for Excalidraw to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ excalidraw_http_port }}"
    method: GET
    status_code: 200
  register: excalidraw_health
  retries: 10
  delay: 3
  until: excalidraw_health.status == 200
