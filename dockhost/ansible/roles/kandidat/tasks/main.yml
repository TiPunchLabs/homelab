---
# =============================================================================
# PostgreSQL — create database and user if they don't exist
# =============================================================================
- name: Check if PostgreSQL user exists
  community.docker.docker_container_exec:
    container: "{{ kandidat_db_container }}"
    command: >-
      psql -U {{ kandidat_db_superuser }} -tAc
      "SELECT 1 FROM pg_roles WHERE rolname='{{ kandidat_db_user }}'"
  register: kandidat_pg_user_check
  changed_when: false

- name: Create PostgreSQL user for kandidat
  community.docker.docker_container_exec:
    container: "{{ kandidat_db_container }}"
    command: >-
      psql -U {{ kandidat_db_superuser }} -c
      "CREATE USER {{ kandidat_db_user }} WITH PASSWORD '{{ vault_kandidat_db_password }}';"
  when: kandidat_pg_user_check.stdout | trim != "1"

- name: Check if PostgreSQL database exists
  community.docker.docker_container_exec:
    container: "{{ kandidat_db_container }}"
    command: >-
      psql -U {{ kandidat_db_superuser }} -tAc
      "SELECT 1 FROM pg_database WHERE datname='{{ kandidat_db_name }}'"
  register: kandidat_pg_db_check
  changed_when: false

- name: Create PostgreSQL database for kandidat
  community.docker.docker_container_exec:
    container: "{{ kandidat_db_container }}"
    command: >-
      psql -U {{ kandidat_db_superuser }} -c
      "CREATE DATABASE {{ kandidat_db_name }} OWNER {{ kandidat_db_user }} ENCODING 'UTF8';"
  when: kandidat_pg_db_check.stdout | trim != "1"

# =============================================================================
# Application — deploy kandidat container
# =============================================================================
- name: Create directory for docker-compose
  ansible.builtin.file:
    path: "{{ kandidat_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create data directory
  ansible.builtin.file:
    path: "{{ kandidat_data_dir }}"
    state: directory
    owner: "{{ kandidat_uid }}"
    group: "{{ kandidat_gid }}"
    mode: '0755'

- name: Login to GitLab Container Registry
  community.docker.docker_login:
    registry_url: "https://registry.gitlab.com"
    username: "{{ vault_kandidat_registry_user }}"
    password: "{{ vault_kandidat_registry_password }}"

- name: Copy docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ kandidat_install_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0600'
  notify: Restart kandidat

- name: Deploy kandidat with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ kandidat_install_dir }}"
    state: present
    pull: always
    recreate: auto
    remove_orphans: true
  register: kandidat_deploy

- name: Wait for kandidat to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ kandidat_port }}/"
    status_code: 200
  register: kandidat_ready
  retries: 10
  delay: 3
  until: kandidat_ready.status == 200
