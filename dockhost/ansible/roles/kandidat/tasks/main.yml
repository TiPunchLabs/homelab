---
# =============================================================================
# PostgreSQL — create database and user if they don't exist (Komodo does not do this)
# =============================================================================
- name: Check if PostgreSQL user exists
  community.docker.docker_container_exec:
    container: "{{ kandidat_db_container }}"
    command: >-
      psql -U {{ kandidat_db_superuser }} -tAc
      "SELECT 1 FROM pg_roles WHERE rolname='{{ kandidat_db_user }}'"
  register: kandidat_pg_user_check
  changed_when: false

- name: Create PostgreSQL user for kandidat
  community.docker.docker_container_exec:
    container: "{{ kandidat_db_container }}"
    command: >-
      psql -U {{ kandidat_db_superuser }} -c
      "CREATE USER {{ kandidat_db_user }} WITH PASSWORD '{{ vault_kandidat_db_password }}';"
  when: kandidat_pg_user_check.stdout | trim != "1"

- name: Check if PostgreSQL database exists
  community.docker.docker_container_exec:
    container: "{{ kandidat_db_container }}"
    command: >-
      psql -U {{ kandidat_db_superuser }} -tAc
      "SELECT 1 FROM pg_database WHERE datname='{{ kandidat_db_name }}'"
  register: kandidat_pg_db_check
  changed_when: false

- name: Create PostgreSQL database for kandidat
  community.docker.docker_container_exec:
    container: "{{ kandidat_db_container }}"
    command: >-
      psql -U {{ kandidat_db_superuser }} -c
      "CREATE DATABASE {{ kandidat_db_name }} OWNER {{ kandidat_db_user }} ENCODING 'UTF8';"
  when: kandidat_pg_db_check.stdout | trim != "1"

# =============================================================================
# Host prep only — Komodo owns the deploy (image pull via group registry account +
# compose up reconciled from homelab-gitops). We deliberately do NOT docker_login here
# and do NOT run docker compose. Ansible just creates the bind-mount data dir with the
# ownership the non-root container expects.
# =============================================================================
- name: Create kandidat data directory (writable by the container UID)
  ansible.builtin.file:
    path: "{{ kandidat_data_dir }}"
    state: directory
    owner: "{{ kandidat_uid }}"
    group: "{{ kandidat_gid }}"
    mode: '0755'
