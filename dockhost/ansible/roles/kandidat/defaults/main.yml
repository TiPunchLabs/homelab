---
# Image Docker kandidat (GitLab Container Registry)
kandidat_registry: "registry.gitlab.com/tipunchlabs/kandidat"
kandidat_image_tag: "main"

# Repertoires sur l'hote
kandidat_install_dir: "/opt/kandidat"
kandidat_data_dir: "/app/data/kandidat"

# Port expose
kandidat_port: 8000

# UID/GID du user kandidat dans le conteneur
kandidat_uid: 1000
kandidat_gid: 1000
