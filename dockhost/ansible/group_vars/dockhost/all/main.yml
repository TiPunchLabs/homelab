app_group: "app_data"
app_data_path: "/app/data"
# app_data_gid: 2000

# ============================================================
# 🔐 Sécurité - Rôle security_hardening
# ============================================================
security_ssh_hardening: true
security_allow_users: "{{ vault_security_allow_users | join(' ') }}"
security_disable_root_login: true

security_enable_ufw: true
security_ufw_default_incoming: "deny"
security_ufw_default_outgoing: "allow"

security_open_ports:
  - { port: 22, proto: tcp, comment: "SSH access" }
  - { port: 5432, proto: tcp, comment: "PostgreSQL access" }
  - { port: 8000, proto: tcp, comment: "Kandidat web app" }
  - { port: 8080, proto: tcp, comment: "Open WebUI" }
  - { port: 8082, proto: tcp, comment: "Excalidraw" }
  - { port: 8090, proto: tcp, comment: "Miniboard" }
  - { port: 9120, proto: tcp, comment: "Komodo Core UI + webhook listener" }

# ============================================================
# 🐳 Portainer CE - Role portainer
# ============================================================
portainer_admin_username: "{{ vault_portainer_admin_username }}"
portainer_admin_password: "{{ vault_portainer_admin_password }}"

# ============================================================
# 🦎 Komodo - Role komodo (GitOps docker-compose reconciler)
# ============================================================
komodo_host: "http://komodo.internal"
# Secrets resolved from vault/config.yml:
#   vault_komodo_db_password
#   vault_komodo_admin_password
#   vault_komodo_webhook_secret
#   vault_komodo_jwt_secret

# ============================================================
# 🌐 Open WebUI - Role open_webui
# ============================================================
open_webui_ollama_base_url: "http://192.168.10.101:11434"
open_webui_db_password: "{{ vault_open_webui_db_password }}"
open_webui_database_url: "{{ vault_open_webui_database_url }}"
open_webui_secret_key: "{{ vault_open_webui_secret_key }}"
