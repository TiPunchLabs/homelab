# ============================================================
# 🔐 Securite - Role security_hardening
# ============================================================
security_ssh_hardening: true
security_allow_users: "ansible"
security_disable_root_login: true

security_enable_ufw: true
security_ufw_default_incoming: "deny"
security_ufw_default_outgoing: "allow"

security_open_ports:
  - { port: 22, proto: tcp, comment: "SSH access" }
  - { port: 80, proto: tcp, comment: "HTTP" }
  - { port: 443, proto: tcp, comment: "HTTPS" }

# ============================================================
# 🔀 Reverse Proxy - Role caddy
# ============================================================
caddy_backends:
  - name: proxmox
    domain: proxmox.internal
    upstream: https://192.168.1.100:8006
    tls_insecure_skip_verify: true
    tls_internal: true
  - name: kandidat
    domain: kandidat.internal
    upstream: http://192.168.1.90:8000
    tls_insecure_skip_verify: false
  - name: vpngate
    domain: vpngate.internal
    upstream: http://192.168.1.50:51821
    tls_insecure_skip_verify: false
  - name: portainer
    domain: portainer.internal
    upstream: http://192.168.1.90:9000
    tls_insecure_skip_verify: false
  - name: pihole
    domain: pihole.internal
    upstream: http://192.168.1.71:80
    tls_insecure_skip_verify: false
  - name: openwebui
    domain: openwebui.internal
    upstream: http://192.168.1.90:8080
    tls_insecure_skip_verify: false
