# ============================================================
# 🔐 Securite - Role security_hardening
# ============================================================
security_ssh_hardening: true
security_allow_users: "ansible"
security_disable_root_login: true

security_enable_ufw: true
security_ufw_default_incoming: "deny"
security_ufw_default_outgoing: "allow"

security_open_ports:
  - { port: 22, proto: tcp, comment: "SSH access" }
  - { port: 80, proto: tcp, comment: "HTTP" }
  - { port: 443, proto: tcp, comment: "HTTPS" }

# ============================================================
# 🔀 Reverse Proxy - Role caddy
# ============================================================
# OVH API creds for the DNS-01 challenge of public vhosts (tls_public).
# Real values live in the ansible-vault file group_vars/caddy/vault/config.yml.
caddy_ovh_endpoint: "ovh-eu"
caddy_ovh_application_key: "{{ vault_ovh_application_key }}"
caddy_ovh_application_secret: "{{ vault_ovh_application_secret }}"
caddy_ovh_consumer_key: "{{ vault_ovh_consumer_key }}"

caddy_backends:
  - name: proxmox
    domain: proxmox.internal
    upstream: https://192.168.10.100:8006
    tls_insecure_skip_verify: true
    tls_internal: true
  - name: kandidat
    domain: kandidat.internal
    upstream: http://192.168.10.90:8000
    tls_insecure_skip_verify: false
  - name: portail-client
    domain: portail-client.internal
    upstream: http://192.168.10.90:8091
    # tls internal: Caddy serves HTTPS with its internal CA so the app's Secure
    # session cookie works over the LAN (magic-link login). Trust Caddy's root CA
    # on client machines to avoid a TLS warning.
    tls_internal: true
    tls_insecure_skip_verify: false
  # Public exposure of the portal: portail-client.tipunchlabs.fr -> same upstream.
  # Real Let's Encrypt cert via DNS-01 (OVH). The internal vhost above stays for
  # LAN/VPN access; this one is reachable from the Internet (box :443 forward).
  - name: portail-client-public
    domain: portail-client.tipunchlabs.fr
    upstream: http://192.168.10.90:8091
    tls_public: true
    tls_insecure_skip_verify: false
  - name: vpngate
    domain: vpngate.internal
    upstream: http://192.168.10.50:51821
    tls_insecure_skip_verify: false
  - name: portainer
    domain: portainer.internal
    upstream: http://192.168.10.90:9000
    tls_insecure_skip_verify: false
  - name: pihole
    domain: pihole.internal
    upstream: http://192.168.10.71:80
    tls_insecure_skip_verify: false
  - name: openwebui
    domain: openwebui.internal
    upstream: http://192.168.10.90:8080
    tls_insecure_skip_verify: false
  - name: excalidraw
    domain: excalidraw.internal
    upstream: http://192.168.10.90:8082
    tls_insecure_skip_verify: false
  - name: komodo
    domain: komodo.internal
    upstream: http://192.168.10.90:9120
    tls_insecure_skip_verify: false
  - name: miniboard
    domain: miniboard.internal
    upstream: http://192.168.10.90:8090
    tls_insecure_skip_verify: false
