stages:
  - renovate
  - lint
  - security
  - deploy

# =============================================================================
# Global defaults
# =============================================================================
default:
  interruptible: true

# =============================================================================
# Templates
# =============================================================================
.uv-setup:
  image: python:3.12-slim
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/uv
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  before_script:
    - pip install uv
    - uv sync --frozen

# =============================================================================
# Lint — Ansible
# =============================================================================
ansible-lint:
  stage: lint
  extends: .uv-setup
  script:
    - uv run ansible-lint dockhost/ansible/
    - uv run ansible-lint proxmox/ansible/
    - uv run ansible-lint kubecluster/ansible/
    - uv run ansible-lint bastion/ansible/
    - uv run ansible-lint vpngate/ansible/
    - uv run ansible-lint caddy/ansible/
    - uv run ansible-lint pihole/ansible/

# =============================================================================
# Lint — Terraform
# =============================================================================
terraform-lint:
  stage: lint
  image:
    name: hashicorp/terraform:1.11
    entrypoint: [""]
  retry:
    max: 2
    when: runner_system_failure
  script:
    - terraform fmt -check -recursive
    - mkdir -p ~/.ssh && echo "fake-key-for-ci-validation" > ~/.ssh/id_vm_proxmox_rsa.pub
    - cd $CI_PROJECT_DIR/dockhost/terraform && terraform init -backend=false && terraform validate
    - cd $CI_PROJECT_DIR/kubecluster/terraform && terraform init -backend=false && terraform validate
    - cd $CI_PROJECT_DIR/bastion/terraform && terraform init -backend=false && terraform validate
    - cd $CI_PROJECT_DIR/vpngate/terraform && terraform init -backend=false && terraform validate

# =============================================================================
# Lint — Shell
# =============================================================================
shell-lint:
  stage: lint
  image: koalaman/shellcheck-alpine:v0.10.0
  script:
    - shellcheck scripts/*.sh

# =============================================================================
# Security — Vault encryption check
# =============================================================================
security-check:
  stage: security
  image: alpine:3.21
  script:
    # 1. Vault files must be encrypted
    - |
      echo "=== Checking vault file encryption ==="
      failed=0
      for f in $(find . -path "*/vault/*" -name "*.yml" 2>/dev/null); do
        if ! head -1 "$f" | grep -q '^\$ANSIBLE_VAULT'; then
          echo "ERROR: Unencrypted vault file: $f"
          failed=1
        fi
      done
      [ "$failed" -eq 0 ] && echo "OK: All vault files are encrypted"
      [ "$failed" -eq 1 ] && exit 1
    # 2. No private keys in plaintext
    - |
      echo "=== Checking for private keys ==="
      if grep -rl "BEGIN \(RSA \|OPENSSH \|EC \|DSA \|PGP \)\?PRIVATE KEY" \
        --include="*.yml" --include="*.yaml" --include="*.tf" \
        --include="*.j2" --include="*.sh" --include="*.cfg" --include="*.toml" \
        --exclude-dir=".git" --exclude-dir=".venv" . 2>/dev/null | \
        grep -v "vault/" ; then
        echo "ERROR: Private key found in plaintext (outside vault)"
        exit 1
      fi
      echo "OK: No private keys in plaintext"
    # 3. No hardcoded secrets (passwords, tokens, API keys)
    - |
      echo "=== Checking for hardcoded secrets ==="
      if grep -rE "(password|secret|api.?key|token)\s*[:=]\s*['\"][^'\"]{8,}['\"]" \
        --include="*.tf" --include="*.yml" --include="*.yaml" \
        --include="*.j2" --include="*.sh" --include="*.cfg" --include="*.toml" \
        --exclude-dir=".git" --exclude-dir=".venv" . 2>/dev/null | \
        grep -v "your-" | grep -v "example" | grep -v "placeholder" | \
        grep -v "fake-key" | \
        grep -v '\${var\.' | grep -v 'var\.' | \
        grep -v 'vault/' ; then
        echo "ERROR: Potential secrets found in code"
        exit 1
      fi
      echo "OK: No hardcoded secrets detected"
    # 4. No known token patterns (GitHub PAT, GitLab tokens, AWS keys)
    - |
      echo "=== Checking for known token patterns ==="
      if grep -rE "(ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{80,}|glpat-[a-zA-Z0-9\-_]{20,}|AKIA[0-9A-Z]{16}|Bearer\s+[a-zA-Z0-9\-._~+/]{20,})" \
        --include="*.tf" --include="*.yml" --include="*.yaml" \
        --include="*.j2" --include="*.sh" --include="*.cfg" --include="*.toml" \
        --exclude-dir=".git" --exclude-dir=".venv" . 2>/dev/null | \
        grep -v 'vault/' ; then
        echo "ERROR: Known token pattern found in plaintext"
        exit 1
      fi
      echo "OK: No known token patterns found"

# =============================================================================
# Security — Docker image scan
# =============================================================================
scan-docker-images:
  stage: security
  image: alpine:3.21
  before_script:
    - apk add --no-cache grep sed curl
  script:
    - |
      # Build image list from Ansible defaults (plain YAML, not Jinja)
      images=""
      for defaults in $(find . -path '*/roles/*/defaults/main.yml'); do
        img=$(grep -E '^\w+_image:\s' "$defaults" | head -1 | sed 's/.*:\s*//;s/"//g' | tr -d ' ')
        tag=$(grep -E '^\w+_image_tag:\s' "$defaults" | head -1 | sed 's/.*:\s*//;s/"//g' | tr -d ' ')
        if [ -n "$img" ] && [ -n "$tag" ]; then
          images=$(printf '%s\n%s:%s' "$images" "$img" "$tag")
        fi
      done
      images=$(echo "$images" | grep -v '^$' | sort -u)
      echo "Images found:"
      echo "$images"
      if [ -z "$images" ]; then
        echo "No images to scan"
        exit 0
      fi
    - |
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      for defaults in $(find . -path '*/roles/*/defaults/main.yml'); do
        img=$(grep -E '^\w+_image:\s' "$defaults" | head -1 | sed 's/.*:\s*//;s/"//g' | tr -d ' ')
        tag=$(grep -E '^\w+_image_tag:\s' "$defaults" | head -1 | sed 's/.*:\s*//;s/"//g' | tr -d ' ')
        if [ -n "$img" ] && [ -n "$tag" ]; then
          echo "============================================="
          echo "Scanning: ${img}:${tag}"
          echo "============================================="
          trivy image --severity HIGH,CRITICAL --exit-code 0 --no-progress "${img}:${tag}" || true
        fi
      done
  allow_failure: true

# =============================================================================
# Renovate — Dependency updates
# =============================================================================
renovate:
  stage: renovate
  image: renovate/renovate:latest
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: https://gitlab.com/api/v4
    RENOVATE_AUTODISCOVER: "false"
    LOG_LEVEL: info
  script:
    - renovate "$CI_PROJECT_PATH"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  resource_group: renovate

# =============================================================================
# Deploy — Sync bastion
# =============================================================================
sync-bastion:
  stage: deploy
  tags:
    - bastion
  interruptible: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE != "merge_request_event"
  script:
    - cd ~/homelab
    - git fetch origin main
    - git reset --hard origin/main
