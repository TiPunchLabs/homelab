---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - git
    state: present
    update_cache: true

- name: Create Pi-hole config directory
  ansible.builtin.file:
    path: "{{ pihole_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy setupVars.conf for unattended install
  ansible.builtin.template:
    src: setupVars.conf.j2
    dest: "{{ pihole_install_dir }}/setupVars.conf"
    owner: root
    group: root
    mode: '0644'

- name: Check if Pi-hole is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/pihole
  register: pihole_binary

- name: Download Pi-hole installer
  ansible.builtin.get_url:
    url: https://install.pi-hole.net
    dest: /tmp/pihole-install.sh
    mode: '0755'
  when: not pihole_binary.stat.exists

- name: Install Pi-hole (unattended)
  ansible.builtin.command:
    cmd: bash /tmp/pihole-install.sh --unattended
  when: not pihole_binary.stat.exists
  changed_when: true

- name: Set Pi-hole admin password
  ansible.builtin.command:
    cmd: pihole setpassword {{ vault_pihole_admin_password }}
  changed_when: true
  no_log: true

- name: Add local DNS A records (Pi-hole v6 CLI)
  ansible.builtin.command:
    cmd: pihole a record add {{ item.domain }} {{ item.ip }}
  loop: "{{ pihole_local_records }}"
  register: pihole_add_record
  changed_when: "'already exists' not in pihole_add_record.stdout"
  failed_when:
    - pihole_add_record.rc != 0
    - "'already exists' not in pihole_add_record.stdout"
  notify: Restart pihole-FTL

- name: Ensure pihole-FTL is enabled and started
  ansible.builtin.systemd:
    name: pihole-FTL
    enabled: true
    state: started
