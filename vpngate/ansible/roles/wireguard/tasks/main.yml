---
- name: Create wg-easy data directory
  ansible.builtin.file:
    path: "{{ wg_easy_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Deploy wg-easy docker-compose configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ wg_easy_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0600'
  notify: Restart wg-easy

- name: Deploy wg-easy with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ wg_easy_data_dir }}"
    state: present
