      <circle cx="20" cy="20" r="10" fill="#4A90D9" />
      <text x="40" y="25" font-size="14" font-weight="bold" fill="#2D2A26">bastion-60</text>
      <text x="40" y="40" font-size="12" fill="#5C5650">192.168.1.60</text>
      <text x="20" y="60" font-size="10" fill="#5C5650">2 CPU, 2 GB RAM, 25 GB</text>
      <text x="20" y="80" font-size="12" fill="#5C5650">- GitLab Runner (Shell)</text>
      <text x="20" y="100" font-size="12" fill="#5C5650">- pass</text>
      <text x="20" y="120" font-size="12" fill="#5C5650">- Terraform, Ansible</text>
      <text x="20" y="140" font-size="12" fill="#5C5650">- direnv</text>

      <rect x="250" y="0" width="200" height="150" rx="12" fill="#FFFFFF" border="#D4C5B2" />
      <circle cx="270" cy="20" r="10" fill="#50B83C" />
      <text x="290" y="25" font-size="14" font-weight="bold" fill="#2D2A26">dockhost-50</text>
      <text x="290" y="40" font-size="12" fill="#5C5650">192.168.1.50</text>
      <text x="270" y="60" font-size="10" fill="#5C5650">3 CPU, 10 GB RAM, 100 GB</text>
      <text x="270" y="80" font-size="12" fill="#5C5650">- Portainer Agent (9001)</text>
      <text x="270" y="100" font-size="12" fill="#5C5650">- GitLab Runner (Docker)</text>

      <g transform="translate(500, 0)">
        <rect x="0" y="0" width="150" height="100" rx="12" fill="#FFFFFF" border="#D4C5B2" />
        <circle cx="20" cy="20" r="10" fill="#326CE5" />
        <text x="40" y="25" font-size="14" font-weight="bold" fill="#2D2A26">kubecluster-40</text>
        <text x="40" y="40" font-size="12" fill="#5C5650">192.168.1.40</text>
        <text x="20" y="60" font-size="10" fill="#5C5650">2 CPU, 4 GB RAM, 35 GB</text>

        <rect x="170" y="0" width="150" height="100" rx="12" fill="#FFFFFF" border="#D4C5B2" />
        <circle cx="190" cy="20" r="10" fill="#326CE5" />
        <text x="210" y="25" font-size="14" font-weight="bold" fill="#2D2A26">kubecluster-41</text>
        <text x="210" y="40" font-size="12" fill="#5C5650">192.168.1.41</text>
        <text x="190" y="60" font-size="10" fill="#5C5650">1 CPU, 3.5 GB RAM, 30 GB</text>

        <rect x="340" y="0" width="150" height="100" rx="12" fill="#FFFFFF" border="#D4C5B2" />
        <circle cx="360" cy="20" r="10" fill="#326CE5" />
        <text x="380" y="25" font-size="14" font-weight="bold" fill="#2D2A26">kubecluster-42</text>
        <text x="380" y="40" font-size="12" fill="#5C5650">192.168.1.42</text>
        <text x="360" y="60" font-size="10" fill="#5C5650">1 CPU, 3.5 GB RAM, 30 GB</text>
      </g>
