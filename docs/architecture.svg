<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="sans-serif">
  <text x="50" y="40" font-size="24" font-weight="bold" fill="#2D2A26">Homelab Architecture — TiPunchLabs</text>

  <g transform="translate(1000, 30)">
    <text x="0" y="10" font-size="14" font-weight="bold" fill="#2D2A26">Legend</text>
    <line x1="0" y1="30" x2="30" y2="30" stroke="#8B7E74" stroke-width="2" />
    <text x="40" y="34" font-size="12" fill="#5C5650">SSH</text>
    <line x1="0" y1="50" x2="30" y2="50" stroke="#8B7E74" stroke-width="2" stroke-dasharray="5,5" />
    <text x="40" y="54" font-size="12" fill="#5C5650">API/HTTPS</text>
    <rect x="0" y="70" width="15" height="15" rx="3" fill="#E57000" />
    <text x="25" y="82" font-size="12" fill="#5C5650">Proxmox</text>
    <rect x="0" y="90" width="15" height="15" rx="3" fill="#4A90D9" />
    <text x="25" y="102" font-size="12" fill="#5C5650">Bastion</text>
    <rect x="0" y="110" width="15" height="15" rx="3" fill="#50B83C" />
    <text x="25" y="122" font-size="12" fill="#5C5650">Dockhost</text>
    <rect x="0" y="130" width="15" height="15" rx="3" fill="#326CE5" />
    <text x="25" y="142" font-size="12" fill="#5C5650">K8s</text>
  </g>

  <g transform="translate(50, 100)">
    <text x="0" y="10" font-size="16" font-weight="bold" fill="#2D2A26">External Services</text>
    <rect x="100" y="30" width="150" height="70" rx="12" fill="#FFFFFF" border="#D4C5B2" />
    <circle cx="120" cy="55" r="10" fill="#FC6D26" />
    <text x="140" y="60" font-size="14" font-weight="bold" fill="#2D2A26">GitLab.com</text>
    <text x="140" y="75" font-size="12" fill="#5C5650">tipunchlabs/homelab</text>

    <rect x="300" y="30" width="150" height="70" rx="12" fill="#FFFFFF" border="#D4C5B2" />
    <circle cx="320" cy="55" r="10" fill="#24292E" />
    <text x="340" y="60" font-size="14" font-weight="bold" fill="#2D2A26">GitHub.com</text>
    <text x="340" y="75" font-size="12" fill="#5C5650">TiPunchLabs/homelab</text>
  </g>

  <g transform="translate(50, 200)">
    <text x="0" y="10" font-size="16" font-weight="bold" fill="#2D2A26">CI/CD Pipeline</text>
    <rect x="100" y="30" width="100" height="50" rx="12" fill="#FFFFFF" border="#D4C5B2" />
    <text x="120" y="60" font-size="14" font-weight="bold" fill="#2D2A26">lint</text>
    <text x="120" y="75" font-size="12" fill="#5C5650">Shared Runners (Docker)</text>

    <line x1="200" y1="55" x2="250" y2="55" stroke="#8B7E74" stroke-width="2" />

    <rect x="250" y="30" width="100" height="50" rx="12" fill="#FFFFFF" border="#D4C5B2" />
    <text x="270" y="60" font-size="14" font-weight="bold" fill="#2D2A26">security</text>
    <text x="270" y="75" font-size="12" fill="#5C5650">Shared Runners (Docker)</text>

    <line x1="350" y1="55" x2="400" y2="55" stroke="#8B7E74" stroke-width="2" />

    <rect x="400" y="30" width="100" height="50" rx="12" fill="#FFFFFF" border="#D4C5B2" />
    <text x="420" y="60" font-size="14" font-weight="bold" fill="#2D2A26">deploy</text>
    <text x="420" y="75" font-size="12" fill="#5C5650">Bastion Runner (Shell)</text>
  </g>

  <g transform="translate(50, 350)">
    <text x="0" y="10" font-size="16" font-weight="bold" fill="#2D2A26">Proxmox Hypervisor</text>
    <rect x="50" y="30" width="1000" height="400" rx="12" fill="#E57000" border="#D4C5B2" />
    <text x="70" y="60" font-size="14" font-weight="bold" fill="#2D2A26">PVE</text>
    <text x="70" y="75" font-size="12" fill="#5C5650">192.168.1.1</text>

    <g transform="translate(70, 100)">
