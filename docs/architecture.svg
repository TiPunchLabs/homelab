  </g>

  <g transform="translate(50, 800)">
    <text x="0" y="10" font-size="16" font-weight="bold" fill="#2D2A26">Secret Management Chain</text>
    <rect x="100" y="30" width="100" height="30" rx="6" fill="#FFFFFF" border="#D4C5B2" />
    <text x="110" y="50" font-size="12" fill="#5C5650">Ansible Vault</text>

    <line x1="200" y1="45" x2="250" y2="45" stroke="#8B7E74" stroke-width="1.5" />

    <rect x="250" y="30" width="100" height="30" rx="6" fill="#FFFFFF" border="#D4C5B2" />
    <text x="260" y="50" font-size="12" fill="#5C5650">GPG Key</text>

    <line x1="350" y1="45" x2="400" y2="45" stroke="#8B7E74" stroke-width="1.5" />

    <rect x="400" y="30" width="100" height="30" rx="6" fill="#FFFFFF" border="#D4C5B2" />
    <text x="410" y="50" font-size="12" fill="#5C5650">pass init</text>

    <line x1="500" y1="45" x2="550" y2="45" stroke="#8B7E74" stroke-width="1.5" />

    <rect x="550" y="30" width="100" height="30" rx="6" fill="#FFFFFF" border="#D4C5B2" />
    <text x="560" y="50" font-size="12" fill="#5C5650">direnv</text>

    <line x1="650" y1="45" x2="700" y2="45" stroke="#8B7E74" stroke-width="1.5" />

    <rect x="700" y="30" width="100" height="30" rx="6" fill="#FFFFFF" border="#D4C5B2" />
    <text x="710" y="50" font-size="12" fill="#5C5650">Env Vars</text>
