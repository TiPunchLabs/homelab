[defaults]
interpreter_python = /usr/bin/python3
collections_paths = ./.venv/lib/python3.12/site-packages/ansible_collections
inventory = ansible/inventory.yml
# Acceptable for homelab — all hosts are on a trusted LAN
host_key_checking = False
# Workaround: ansible.posix 2.1.0 uses deprecated 'ansible.module_utils._text' imports
# Remove once ansible.posix releases a fix
deprecation_warnings = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./.ansible_fact_cache
remote_user = ansible
private_key_file = ~/.ssh/proxmox
vault_password_file = ../scripts/ansible-vault-pass.sh

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=3600s -o IdentitiesOnly=yes
