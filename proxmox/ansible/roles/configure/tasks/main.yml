---
- name: Remove Proxmox enterprise repo files (.sources format)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.sources
    - /etc/apt/sources.list.d/ceph.sources
  tags:
    - essentials
    - security_ssh_hardening
    - setup_roles_users_tokens
    - generate_vm_template

- name: Add Proxmox no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-no-subscription
    mode: "0644"
  tags:
    - essentials
    - security_ssh_hardening
    - setup_roles_users_tokens
    - generate_vm_template

- name: Add Ceph no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph-no-subscription.sources
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/ceph-squid
      Suites: trixie
      Components: no-subscription
    mode: "0644"
  tags:
    - essentials
    - security_ssh_hardening
    - setup_roles_users_tokens
    - generate_vm_template

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - essentials
    - security_ssh_hardening
    - setup_roles_users_tokens
    - generate_vm_template

- name: Install a list of packages
  ansible.builtin.apt:
    pkg: "{{ configure_packages }}"
  tags:
    - essentials
    - security_ssh_hardening
    - setup_roles_users_tokens
    - generate_vm_template

- name: Install template generation packages
  ansible.builtin.apt:
    pkg: "{{ configure_template_packages }}"
  tags:
    - generate_vm_template

- name: Strengthening the SSH security of the proxmox server
  ansible.builtin.include_tasks:
    file: security_ssh_hardening.yml
    apply:
      tags:
        - security_ssh_hardening
  tags:
    - always

- name: Add setup roles users tokens
  ansible.builtin.include_tasks:
    file: setup_roles_users_tokens.yml
    apply:
      tags:
        - setup_roles_users_tokens
  tags:
    - always

- name: Setup storage
  ansible.builtin.include_tasks:
    file: setup_storage.yml
    apply:
      tags:
        - setup_storage
  tags:
    - always

- name: Generate vm template
  ansible.builtin.include_tasks:
    file: generate_vm_template.yml
    apply:
      tags:
        - generate_vm_template
  tags:
    - always
